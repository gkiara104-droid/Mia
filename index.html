<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mía</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2;
    --warm-white: #F5F1EA;
    --sage: #8FAF8A;
    --sage-light: #C5D9C2;
    --sage-pale: #EAF1E9;
    --rose: #D4A5A0;
    --rose-light: #EDD5D2;
    --rose-pale: #F7EDEC;
    --amber: #C8A96E;
    --amber-light: #E8D5B0;
    --amber-pale: #F5EDD8;
    --earth: #9C8070;
    --earth-light: #C4B0A4;
    --earth-pale: #EDE5E0;
    --text-dark: #2C2520;
    --text-mid: #5C504A;
    --text-light: #9C8E88;
    --border: #E8E0D8;
    --white: #FFFFFF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* APP SHELL */
  .app {
    max-width: 420px;
    margin: 0 auto;
    min-height: 100vh;
    background: var(--cream);
    position: relative;
  }

  /* HEADER */
  .header {
    padding: 52px 28px 20px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .logo {
    font-family: 'Fraunces', serif;
    font-size: 32px;
    font-weight: 300;
    font-style: italic;
    color: var(--text-dark);
    letter-spacing: -0.5px;
  }

  .date-badge {
    font-size: 11px;
    font-weight: 400;
    color: var(--text-light);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-align: right;
    line-height: 1.6;
  }

  /* NAV */
  .nav {
    display: flex;
    gap: 6px;
    padding: 0 28px 24px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .nav::-webkit-scrollbar { display: none; }

  .nav-btn {
    flex-shrink: 0;
    padding: 7px 16px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 400;
    color: var(--text-light);
    cursor: pointer;
    transition: all 0.2s ease;
    white-space: nowrap;
  }

  .nav-btn.active {
    border-color: transparent;
    color: var(--text-dark);
    font-weight: 500;
  }

  .nav-btn[data-section="dashboard"].active { background: var(--amber-pale); border-color: var(--amber-light); }
  .nav-btn[data-section="medicacion"].active { background: var(--rose-pale); border-color: var(--rose-light); }
  .nav-btn[data-section="universidad"].active { background: var(--sage-pale); border-color: var(--sage-light); }
  .nav-btn[data-section="ciclo"].active { background: var(--rose-pale); border-color: var(--rose-light); }
  .nav-btn[data-section="habitos"].active { background: var(--sage-pale); border-color: var(--sage-light); }
  .nav-btn[data-section="journal"].active { background: var(--earth-pale); border-color: var(--earth-light); }
  .nav-btn[data-section="meditacion"].active { background: var(--amber-pale); border-color: var(--amber-light); }
  .nav-btn[data-section="github"].active { background: var(--earth-pale); border-color: var(--earth-light); }

  /* SCREENS */
  .screen { display: none; padding: 0 28px 100px; animation: fadeIn 0.25s ease; }
  .screen.active { display: block; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* SECTION TITLE */
  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 300;
    color: var(--text-dark);
    margin-bottom: 20px;
    letter-spacing: -0.3px;
  }

  /* CARDS */
  .card {
    background: var(--white);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 12px;
    border: 1px solid var(--border);
  }

  .card-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 8px;
  }

  .card-title {
    font-family: 'Fraunces', serif;
    font-size: 17px;
    font-weight: 400;
    color: var(--text-dark);
    margin-bottom: 4px;
  }

  .card-sub {
    font-size: 13px;
    color: var(--text-light);
    line-height: 1.5;
  }

  /* DASHBOARD */
  .dash-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }

  .dash-tile {
    border-radius: 16px;
    padding: 18px;
    cursor: pointer;
    transition: transform 0.15s ease;
    border: 1px solid transparent;
  }
  .dash-tile:hover { transform: scale(0.98); }

  .dash-tile.amber { background: var(--amber-pale); border-color: var(--amber-light); }
  .dash-tile.rose { background: var(--rose-pale); border-color: var(--rose-light); }
  .dash-tile.sage { background: var(--sage-pale); border-color: var(--sage-light); }
  .dash-tile.earth { background: var(--earth-pale); border-color: var(--earth-light); }

  .dash-tile-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 8px;
  }

  .dash-tile-value {
    font-family: 'Fraunces', serif;
    font-size: 24px;
    font-weight: 300;
    color: var(--text-dark);
    line-height: 1;
    margin-bottom: 4px;
  }

  .dash-tile-info {
    font-size: 11px;
    color: var(--text-mid);
  }

  .dash-wide {
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: transform 0.15s ease;
  }
  .dash-wide:hover { transform: scale(0.99); }

  .dash-wide.journal-tile { background: var(--earth-pale); border: 1px solid var(--earth-light); }
  .dash-wide.med-tile { background: var(--rose-pale); border: 1px solid var(--rose-light); }

  .dash-wide-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 6px;
  }

  .dash-wide-text {
    font-family: 'Fraunces', serif;
    font-size: 15px;
    font-weight: 300;
    font-style: italic;
    color: var(--text-dark);
    line-height: 1.5;
  }

  /* BUTTONS */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 20px;
    border-radius: 12px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .btn-primary { background: var(--text-dark); color: var(--white); }
  .btn-primary:hover { background: var(--text-mid); }

  .btn-rose { background: var(--rose-pale); color: var(--text-dark); border: 1px solid var(--rose-light); }
  .btn-sage { background: var(--sage-pale); color: var(--text-dark); border: 1px solid var(--sage-light); }
  .btn-amber { background: var(--amber-pale); color: var(--text-dark); border: 1px solid var(--amber-light); }
  .btn-earth { background: var(--earth-pale); color: var(--text-dark); border: 1px solid var(--earth-light); }
  .btn-outline { background: transparent; color: var(--text-dark); border: 1.5px solid var(--border); }

  .btn:hover { opacity: 0.85; transform: scale(0.98); }

  .btn-full { width: 100%; justify-content: center; margin-bottom: 10px; }

  /* INPUTS */
  .input-group { margin-bottom: 16px; }
  .input-label { font-size: 12px; font-weight: 500; color: var(--text-mid); margin-bottom: 6px; display: block; letter-spacing: 0.02em; }

  .input, .textarea, .select {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text-dark);
    outline: none;
    transition: border-color 0.2s;
  }
  .input:focus, .textarea:focus, .select:focus { border-color: var(--earth-light); }
  .textarea { resize: none; line-height: 1.6; }

  /* TOGGLE GROUP */
  .toggle-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .toggle-btn {
    padding: 8px 14px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text-mid);
    cursor: pointer;
    transition: all 0.15s;
  }
  .toggle-btn.selected { background: var(--rose-pale); border-color: var(--rose-light); color: var(--text-dark); font-weight: 500; }

  /* DIVIDER */
  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  /* STATUS PILL */
  .pill {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .pill-rose { background: var(--rose-pale); color: var(--rose); }
  .pill-sage { background: var(--sage-pale); color: var(--sage); }
  .pill-amber { background: var(--amber-pale); color: var(--amber); }
  .pill-earth { background: var(--earth-pale); color: var(--earth); }

  /* LOG ENTRY */
  .log-entry {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .log-entry:last-child { border-bottom: none; }

  .log-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-top: 6px;
    flex-shrink: 0;
  }
  .log-dot-rose { background: var(--rose); }
  .log-dot-sage { background: var(--sage); }
  .log-dot-amber { background: var(--amber); }

  .log-time { font-size: 12px; color: var(--text-light); margin-bottom: 2px; }
  .log-text { font-size: 14px; color: var(--text-dark); }
  .log-sub { font-size: 12px; color: var(--text-light); margin-top: 2px; }

  /* HABIT ROW */
  .habit-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
  }
  .habit-row:last-child { border-bottom: none; }

  .habit-info { flex: 1; }
  .habit-name { font-size: 15px; color: var(--text-dark); font-weight: 400; }
  .habit-meta { font-size: 12px; color: var(--text-light); margin-top: 2px; }

  .check-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--white);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: transparent;
    flex-shrink: 0;
  }
  .check-btn.done {
    background: var(--sage-pale);
    border-color: var(--sage);
    color: var(--sage);
  }

  /* CALENDAR STRIP */
  .cal-strip {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 4px;
    margin-bottom: 20px;
  }
  .cal-strip::-webkit-scrollbar { display: none; }

  .cal-day {
    flex-shrink: 0;
    width: 44px;
    height: 60px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: var(--white);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .cal-day.today { background: var(--text-dark); border-color: var(--text-dark); }
  .cal-day.today .cal-d { color: var(--white); }
  .cal-day.today .cal-wd { color: rgba(255,255,255,0.6); }
  .cal-day.marked { border-color: var(--rose); background: var(--rose-pale); }
  .cal-day.marked .cal-dot { display: block; }

  .cal-wd { font-size: 9px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-light); }
  .cal-d { font-size: 16px; font-weight: 500; color: var(--text-dark); font-family: 'Fraunces', serif; }
  .cal-dot { display: none; width: 5px; height: 5px; border-radius: 50%; background: var(--rose); }

  /* PROGRESS BAR */
  .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 10px; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
  .progress-fill.sage { background: var(--sage); }
  .progress-fill.rose { background: var(--rose); }
  .progress-fill.amber { background: var(--amber); }
  .progress-fill.earth { background: var(--earth); }

  /* WATER TRACKER */
  .water-dots { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .water-dot {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid var(--sage-light);
    background: var(--white);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: transparent;
  }
  .water-dot.filled { background: var(--sage-pale); border-color: var(--sage); color: var(--sage); }

  /* JOURNAL */
  .prompt-card {
    background: var(--earth-pale);
    border: 1px solid var(--earth-light);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
  }
  .prompt-tag { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--earth); font-weight: 500; margin-bottom: 10px; }
  .prompt-text { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 300; color: var(--text-dark); line-height: 1.5; font-style: italic; }

  /* MEDITATION */
  .breathe-ring {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 3px solid var(--amber-light);
    margin: 20px auto;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: transform 4s ease-in-out;
  }
  .breathe-inner {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: var(--amber-pale);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: var(--text-mid);
    font-weight: 400;
    transition: all 4s ease-in-out;
    text-align: center;
    padding: 10px;
    line-height: 1.3;
  }
  .breathe-ring.inhale { transform: scale(1.2); border-color: var(--amber); }
  .breathe-ring.inhale .breathe-inner { width: 110px; height: 110px; background: var(--amber-light); }
  .breathe-ring.exhale { transform: scale(0.9); border-color: var(--amber-light); }
  .breathe-ring.exhale .breathe-inner { width: 70px; height: 70px; }

  /* GITHUB */
  .github-card {
    background: var(--text-dark);
    border-radius: 16px;
    padding: 24px;
    color: var(--white);
    margin-bottom: 12px;
  }
  .github-card .card-label { color: rgba(255,255,255,0.5); }
  .github-card .card-title { color: var(--white); font-family: 'Fraunces', serif; font-size: 20px; font-weight: 300; }
  .code-block {
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 14px;
    margin-top: 14px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: rgba(255,255,255,0.85);
    line-height: 1.8;
    overflow-x: auto;
  }
  .code-comment { color: rgba(255,255,255,0.35); }

  .step-row {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .step-row:last-child { border-bottom: none; }

  .step-num {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--amber-pale);
    border: 1px solid var(--amber-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dark);
    flex-shrink: 0;
  }

  .step-content {}
  .step-title { font-size: 14px; font-weight: 500; color: var(--text-dark); margin-bottom: 3px; }
  .step-desc { font-size: 13px; color: var(--text-light); line-height: 1.5; }

  /* NOTIFICATION */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text-dark);
    color: var(--white);
    padding: 12px 20px;
    border-radius: 24px;
    font-size: 13px;
    font-weight: 400;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 420px;
    background: rgba(250,247,242,0.92);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-around;
    padding: 10px 0 20px;
    z-index: 50;
  }

  .bnav-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 12px;
    transition: opacity 0.2s;
  }
  .bnav-icon {
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .bnav-icon svg { width: 20px; height: 20px; stroke: var(--text-light); fill: none; stroke-width: 1.5; stroke-linecap: round; }
  .bnav-label { font-size: 9px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--text-light); font-weight: 400; }
  .bnav-btn.active .bnav-icon svg { stroke: var(--text-dark); }
  .bnav-btn.active .bnav-label { color: var(--text-dark); font-weight: 500; }

  /* ICON */
  .app-icon {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--amber-pale) 0%, var(--rose-pale) 50%, var(--sage-pale) 100%);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* TASK */
  .task-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .task-row:last-child { border-bottom: none; }
  .task-check {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    border: 2px solid var(--border);
    background: var(--white);
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: transparent;
  }
  .task-check.done { background: var(--sage-pale); border-color: var(--sage); color: var(--sage); font-weight: 700; }
  .task-text { font-size: 14px; color: var(--text-dark); flex: 1; }
  .task-date { font-size: 11px; color: var(--text-light); }

  /* TIMER */
  .timer-display {
    text-align: center;
    font-family: 'Fraunces', serif;
    font-size: 52px;
    font-weight: 300;
    color: var(--text-dark);
    margin: 20px 0;
    letter-spacing: -2px;
  }

  /* TAGS */
  .tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .tag {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 400;
    background: var(--warm-white);
    border: 1px solid var(--border);
    color: var(--text-mid);
  }

  /* NOTES QUICK */
  .note-card {
    background: var(--amber-pale);
    border: 1px solid var(--amber-light);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 8px;
    font-size: 13px;
    color: var(--text-dark);
    line-height: 1.5;
  }
  .note-card-time { font-size: 11px; color: var(--text-light); margin-bottom: 4px; }

  /* CYCLE VISUAL */
  .cycle-bar {
    height: 8px;
    border-radius: 4px;
    background: var(--border);
    margin: 16px 0 8px;
    overflow: hidden;
    position: relative;
  }
  .cycle-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--rose-light), var(--rose));
    transition: width 0.5s ease;
  }
  .cycle-phases { display: flex; justify-content: space-between; }
  .cycle-phase { font-size: 10px; color: var(--text-light); }

  /* INFO ROW */
  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .info-row:last-child { border-bottom: none; }
  .info-key { font-size: 13px; color: var(--text-light); }
  .info-val { font-size: 13px; color: var(--text-dark); font-weight: 500; }

  /* SLEEP */
  .sleep-row { display: flex; gap: 10px; }
  .sleep-row .input { flex: 1; }
</style>
